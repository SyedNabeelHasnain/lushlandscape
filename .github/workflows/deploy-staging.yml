name: Deploy (Staging)
on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: lush-staging-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          HOST: ${{ secrets.STAGING_SSH_HOST }}
          USER: ${{ secrets.STAGING_SSH_USER }}
          DIR: ${{ secrets.STAGING_DEPLOY_DIR }}
          KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$DIR" ]; then
            echo "Missing one of required secrets: STAGING_SSH_HOST, STAGING_SSH_USER, STAGING_DEPLOY_DIR"
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "STAGING_SSH_PRIVATE_KEY is empty. Add it in Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          PORT="${{ secrets.STAGING_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=65002; fi
          ssh-keyscan -4 -p "$PORT" -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Execute Deploy Script
        env:
          HOST: ${{ secrets.STAGING_SSH_HOST }}
          PORT: ${{ secrets.STAGING_SSH_PORT }}
          USER: ${{ secrets.STAGING_SSH_USER }}
          DIR: ${{ secrets.STAGING_DEPLOY_DIR }}
        run: |
          if [ -z "$PORT" ]; then PORT=65002; fi
          ssh -4 -p "$PORT" -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$USER@$HOST" "cd \"$DIR\" && git fetch --all && git reset --hard origin/main && DEPLOY_TARGET=staging bash deploy.sh"
